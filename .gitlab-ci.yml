include:
  - project: shared/devops-toolkit
    ref: main
    file:
      - /gitlab-ci/_test/echo.yml
      - /gitlab-ci/build_deploy/nodejs-monorepo.yml
      - /gitlab-ci/changesets_version_channel/pnpm.yml
      - /gitlab-ci/changesets_publish/changesets-publish.yml

stages:
  - echo
  - version
  - docker_build
  - deploy_trigger
  - publish

workflow:
  rules:
    # 讓 publish/npmjs 分支不受 [skip ci] 影響（避免 merge 時被跳）
    - if: '$CI_COMMIT_BRANCH == "publish/npmjs"'
      when: always
    - if: '$CI_COMMIT_MESSAGE =~ /(\[skip ci\]|\[ci skip\])/i'
      when: never
    - when: always

echo:
  stage: echo
  extends: .echo

version_stable:
  stage: version
  extends: .changesets_version_channel
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "release/stable"'
  variables:
    REF: "release/stable"
    CHANNEL: "stable"
    # PUSH_VERSION: "true"

# ----------------------------
# release/*：只做 version（commit + push 回 release/*）
# ----------------------------
version_release:
  stage: version
  extends: .changesets_version_channel
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ /^release\/(stable|alpha|beta|rc)$/'
  variables:
    REF: "$CI_COMMIT_BRANCH"
    PUSH_VERSION: "true"

# ----------------------------
# publish/npmjs：只做 npm publish（不再改 repo）
# ----------------------------
publish_npmjs:
  stage: publish
  extends: .changesets_publish
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "publish/npmjs"'
      when: manual
      allow_failure: false
  variables:
    CHANNEL: "auto" # ✅ 讓 toolkit 自動從 MR 來源分支推導 stable/alpha/beta/rc
    PUSH_TAGS: "true"

# 1. 執行偵測：產出 dynamic-apps-pipeline.yml
detect_project:
  stage: deploy_trigger
  extends: .build_deploy:detect
  variables:
    DEPLOY_NAMESPACE: "rfjs-dev"
    DEPLOY_ENV: "royfw-dev"
  artifacts:
    paths:
      - dynamic-deploy-pipeline.yml
      - .deploy/
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^deploy\/(dev|prod)$/'
      variables:
        KUBECONFIG: ${ROYFW_KUBECONFIG}

# 2. 觸發動態產生的 Jobs (Child Pipeline)
trigger_project:
  stage: deploy_trigger
  needs: [detect_project]
  extends: .build_deploy:trigger
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^deploy\/(dev|prod)$/'
      variables:
        KUBECONFIG: ${ROYFW_KUBECONFIG}
