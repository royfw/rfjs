name: Deploy

on:
  push:
    branches:
      - main
      - release/*
      - deploy/*
      - publish/*

jobs:
  deploy:
    uses: royfw/devops-toolkit/.github/workflows/gitlab-sync-trigger-and-wait.yml@main
    with:
      deploy_env: royfw-dev
      poll_interval: 10
    secrets:
      gitlab_push_host: ${{ secrets.GITLAB_PUSH_HOST }}
      gitlab_project_path: ${{ secrets.GITLAB_PROJECT_PATH }}
      gitlab_project_id: ${{ secrets.GITLAB_PROJECT_ID }}
      gitlab_push_token: ${{ secrets.GITLAB_PUSH_TOKEN }}
      gitlab_trigger_token: ${{ secrets.GITLAB_TRIGGER_TOKEN }}
      gitlab_api_token: ${{ secrets.GITLAB_API_TOKEN }}
